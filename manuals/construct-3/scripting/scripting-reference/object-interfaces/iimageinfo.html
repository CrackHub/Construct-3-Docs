<h1 itemprop="headline">
                IImageInfo script interface
            </h1>
<div itemprop="articleBody">
<p>The <code>IImageInfo</code> interface represents an image in the project. It is also the base class of <a class="extern" href="ianimationframe.html" rel="noopener" target="_blank" title="Make your own games">IAnimationFrame</a>.</p>
<a class="internalNavLink" id="internalH1Link0" name="internalH1Link0"></a><h2>IImageInfo APIs</h2>
<dl>
<dt>width</dt>
<dt>height</dt>
<dt>getSize()</dt>
<dd>Read-only numbers specifying the dimensions of the image in pixels. The method returns both values at the same time.</dd>
</dl>
