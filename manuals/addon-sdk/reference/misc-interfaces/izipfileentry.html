<h1 itemprop="headline">
                IZipFileEntry interface
            </h1>
<div itemprop="articleBody">
<p>The <code>IZipFileEntry</code> interface is an opaque reference to an file entry in <a class="extern" href="izipfile.html" rel="noopener" target="_blank" title="Make your own games">IZipFile</a>. It has no methods - instead, simply pass it to one of the other methods in IZipFile.</p>
