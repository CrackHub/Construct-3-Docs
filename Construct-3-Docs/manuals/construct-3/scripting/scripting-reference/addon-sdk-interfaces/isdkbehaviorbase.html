<h1 itemprop="headline">
                ISDKPluginBase addon SDK interface
            </h1>
<div itemprop="articleBody">
<p>The <code>ISDKBehaviorBase</code> interface is used in the runtime as a base class for behaviors created with the addon SDK. It derives from <a class="extern" href="../object-interfaces/ibehavior.html" rel="noopener" target="_blank" title="Make your own games">IBehavior</a>.
</p>
<a class="internalNavLink" id="internalH1Link0" name="internalH1Link0"></a><h2>ISDKBehaviorBase APIs</h2>
<p>The <code>ISDKBehaviorBase</code> interface does not currently have any of its own APIs.</p>
